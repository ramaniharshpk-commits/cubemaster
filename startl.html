<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Start Learning | CubeMaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #111827;
        }

        nav h1 {
            color: #22d3ee;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #22d3ee;
        }

        /* HERO SECTION */
        .learn-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
        }

        .learn-box {
            background: #111827;
            padding: 50px;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        .learn-box h2 {
            font-size: 40px;
            margin-bottom: 20px;
            color: #22d3ee;
        }

        .learn-box p {
            margin-bottom: 30px;
            color: #cbd5e1;
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #22d3ee;
            color: #0f172a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #06b6d4;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #0f172a;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            nav {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <h1>WebCubastixTwist</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- LEARN SECTION -->
    <section class="learn-section">
        <div class="learn-box">
            <h2>Start Learning Rubik's Cube</h2>
            <p>
                Click below to watch our step-by-step solving tutorials
                and become a cube master!
            </p>

            <!-- 🔥 REPLACE THIS LINK WITH YOUR YOUTUBE LINK -->
            <a href="https://www.youtube.com/@WebCubastixTwist" target="_blank" class="btn">
                Watch on YouTube
            </a>
        </div>
    </section>

    <footer>
        © 2026 CubeMaster | All Rights Reserved
    </footer>

</body>

</html>
